name: verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: verify-${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [core, theorems, regressions, derived]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Record environment
        run: |
          mkdir -p artifacts/verification
          python scripts/record_environment.py | tee artifacts/verification/environment-${{ matrix.suite }}.txt
      - name: Check repository and run suite
        shell: bash
        run: |
          set -o pipefail
          make PYTHON=python SYSTEM_PYTHON=python check verify-${{ matrix.suite }} 2>&1 | tee artifacts/verification/verify-${{ matrix.suite }}.log
      - name: Archive verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-${{ matrix.suite }}-${{ github.sha }}
          path: artifacts/verification/
          if-no-files-found: error
