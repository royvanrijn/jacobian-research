name: finite-etale-lean-branch

on:
  push:
    branches:
      - agent/finite-etale-lean
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    name: build-finite-etale-lean
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Build the finite-etale Keller certificate
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: formal/finite-etale-keller
          auto-config: false
          build: true
          test: false
          lint: false
          use-mathlib-cache: true

  report:
    name: report-finite-etale-lean
    if: ${{ always() }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report branch build to issue 11
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["REPOSITORY"]
          result = os.environ["BUILD_RESULT"]
          run_id = os.environ["RUN_ID"]
          head_sha = os.environ["HEAD_SHA"]
          token = os.environ["GH_TOKEN"]
          body = (
              "<!-- finite-etale-lean-ci -->\n"
              f"Finite-étale Lean branch CI: **{result}**. "
              f"Run ID `{run_id}`, head `{head_sha}`."
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/11/comments",
              data=json.dumps({"body": body}).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              response.read()
          PY
