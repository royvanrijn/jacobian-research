name: finite-etale-lean-branch

on:
  push:
    branches:
      - agent/finite-etale-lean
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: finite-etale-lean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-finite-etale-lean
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Install Lean, prime Mathlib, and build the lightweight certificate
        id: lean_action
        continue-on-error: true
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: formal/finite-etale-keller
          auto-config: false
          build: true
          build-args: FiniteEtaleKeller.ExplicitPolynomial
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Compile the relevant certificate with captured output
        id: lean_build
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        env:
          LIGHT_RESULT: ${{ steps.lean_action.outcome }}
        run: |
          mkdir -p artifacts/verification
          set -o pipefail
          cd formal/finite-etale-keller
          if [ "$LIGHT_RESULT" = success ]; then
            lake build 2>&1 | tee ../../artifacts/verification/finite-etale-lean.log
          else
            lake build FiniteEtaleKeller.ExplicitPolynomial \
              2>&1 | tee ../../artifacts/verification/finite-etale-lean.log
          fi
      - name: Report branch build to issue 11
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ steps.lean_build.outcome }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import urllib.request

          repository = os.environ["REPOSITORY"]
          result = os.environ["BUILD_RESULT"]
          run_id = os.environ["RUN_ID"]
          head_sha = os.environ["HEAD_SHA"]
          token = os.environ["GH_TOKEN"]
          log_path = Path("artifacts/verification/finite-etale-lean.log")
          lines = log_path.read_text(errors="replace").splitlines() if log_path.exists() else []
          tail = "\n".join(lines[-120:])
          if len(tail) > 30000:
              tail = tail[-30000:]
          body = (
              "<!-- finite-etale-lean-ci -->\n"
              f"Finite-étale Lean branch CI: **{result}**. "
              f"Run ID `{run_id}`, head `{head_sha}`.\n\n"
              "<details><summary>Compiler tail</summary>\n\n"
              f"```text\n{tail}\n```\n\n</details>"
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/comments/5073755913",
              data=json.dumps({"body": body}).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="PATCH",
          )
          with urllib.request.urlopen(request) as response:
              response.read()
          PY
      - name: Require a clean Lean build
        if: ${{ always() }}
        env:
          BUILD_RESULT: ${{ steps.lean_build.outcome }}
        run: test "$BUILD_RESULT" = success
